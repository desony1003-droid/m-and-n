    <style>
        :root {
            --kitty-pink: #FFB7C5;
            --kitty-dark: #FB6F92;
            --pink-bg: #FFE5EC;
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

            background-size: cover;
            background-attachment: fixed;
            color: #4A4A4A;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1200px;
        }

        .kitty-decoration {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 90px;
            height: 90px;
            background: url('https://i.pinimg.com/originals/a0/78/3e/a0783e1577908b981600f72295551ec4.png') no-repeat center/contain;
            opacity: 0.8;
            pointer-events: none;
            z-index: 5;
        }

        h1 {
            font-size: 2.2rem;
            color: white;
            text-align: center;
            margin-top: 35px;
            font-weight: 700;
            text-shadow: 0 4px 12px rgba(251, 111, 146, 0.6), 0 0 20px rgba(255,255,255,0.4);
            animation: floatText 3s ease-in-out infinite alternate;
            z-index: 10;
        }
        @keyframes floatText {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        #falling-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

            gap: 15px;
            flex-wrap: wrap;
            margin-top: 35px;
            z-index: 10;
            transform-style: preserve-3d;
            max-width: 95%;
        }
